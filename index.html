<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta</title>
    <!-- Tailwind CSS para un diseño moderno y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Tu archivo de estilos personalizado -->
    <link rel="stylesheet" href="css/style.css">
    <style>
      .page-content { display: none; }
      .page-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 p-4 min-h-screen">
    <div class="max-w-4xl mx-auto">
        <!-- Título de la Aplicación -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Punto de Venta</h1>
        
        <!-- Contenedor de la aplicación -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">

            <!-- Menú de Inicio -->
            <div id="home-menu" class="page-content active text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Menú Principal</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button data-page="pos-page" class="menu-btn bg-blue-600 text-white font-bold p-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                        <i class="fas fa-cash-register mr-2"></i> Punto de Venta
                    </button>
                    <button data-page="products-page" class="menu-btn bg-blue-600 text-white font-bold p-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                        <i class="fas fa-boxes-stacked mr-2"></i> Gestión de Productos
                    </button>
                    <button data-page="history-page" class="menu-btn bg-blue-600 text-white font-bold p-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                        <i class="fas fa-clipboard-list mr-2"></i> Historial de Ventas
                    </button>
                    <button data-page="cash-page" class="menu-btn bg-blue-600 text-white font-bold p-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                        <i class="fas fa-wallet mr-2"></i> Caja y Gastos
                    </button>
                    <button data-page="customers-page" class="menu-btn bg-blue-600 text-white font-bold p-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                        <i class="fas fa-users mr-2"></i> Clientes
                    </button>
                    <button data-page="config-page" class="menu-btn bg-blue-600 text-white font-bold p-6 rounded-lg shadow-md hover:bg-blue-700 transition-colors">
                        <i class="fas fa-cog mr-2"></i> Configuración
                    </button>
                </div>
            </div>
            
            <!-- Página de Clientes -->
            <div id="customers-page" class="page-content">
                <button data-page="home-menu" class="back-to-menu-btn mb-4 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver al Menú
                </button>
                <h2 class="text-xl font-semibold text-gray-700 mb-4">Gestión de Clientes</h2>
                <form id="add-customer-form" class="flex space-x-2 mb-4">
                    <input type="text" id="customer-name-input" placeholder="Nombre del cliente" required class="flex-grow px-4 py-2 border rounded-lg">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-user-plus"></i> Añadir
                    </button>
                </form>
                <div id="customers-list-container" class="space-y-2">
                    <!-- Clientes se cargan aquí -->
                </div>
            </div>

            <!-- Página de Punto de Venta -->
            <div id="pos-page" class="page-content">
                <button data-page="home-menu" class="back-to-menu-btn mb-4 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver al Menú
                </button>
                <!-- ...tu contenido original aquí... -->
            </div>

            <!-- Página de Gestión de Productos -->
            <div id="products-page" class="page-content">
                <button data-page="home-menu" class="back-to-menu-btn mb-4 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver al Menú
                </button>
                <!-- ...tu contenido original aquí... -->
            </div>

            <!-- Página de Historial de Ventas -->
            <div id="history-page" class="page-content">
                <button data-page="home-menu" class="back-to-menu-btn mb-4 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver al Menú
                </button>
                <!-- ...tu contenido original aquí... -->
            </div>

            <!-- Página de Caja y Gastos -->
            <div id="cash-page" class="page-content">
                <button data-page="home-menu" class="back-to-menu-btn mb-4 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver al Menú
                </button>
                <!-- ...tu contenido original aquí... -->
            </div>

            <!-- Nueva Página de Configuración -->
            <div id="config-page" class="page-content">
                <button data-page="home-menu" class="back-to-menu-btn mb-4 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver al Menú
                </button>
                <!-- ...tu contenido original aquí... -->
            </div>
        </div>
        
        <!-- Diálogo modal para mensajes -->
        <div id="modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg max-w-sm w-full text-center">
                <p id="modal-message" class="text-lg font-semibold mb-4"></p>
                <button id="modal-close-btn" class="px-4 py-2 bg-blue-500 text-white rounded-lg">Cerrar</button>
            </div>
        </div>
        
        <!-- Modal para añadir formas de pago -->
        <div id="payment-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg max-w-sm w-full">
                <h3 class="text-lg font-semibold mb-4">Añadir Forma de Pago</h3>
                <form id="add-payment-form" class="space-y-4">
                    <input type="text" id="new-payment-name" placeholder="Nombre de la forma de pago" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <div class="flex justify-end space-x-2">
                        <button type="button" id="cancel-payment-btn" class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg">Cancelar</button>
                        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg">Añadir</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal para procesar pagos múltiples -->
        <div id="split-payment-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg max-w-lg w-full">
                <h3 class="text-xl font-semibold mb-2">Procesar Pago</h3>
                <p class="text-gray-600 mb-4">Total a pagar: <span id="payment-total-display" class="font-bold">$0.00</span></p>

                <div id="payment-inputs-container" class="space-y-4 mb-4">
                    <!-- Los inputs de pago se añadirán aquí dinámicamente -->
                </div>
                
                <div class="flex justify-between items-center mb-4">
                    <button id="add-payment-input-btn" class="px-3 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        <i class="fas fa-plus"></i> Añadir Pago
                    </button>
                    <div class="text-lg font-bold">
                        Restante: <span id="payment-remaining-display" class="text-red-600">$0.00</span>
                    </div>
                </div>

                <div class="flex justify-end space-x-2">
                    <button id="cancel-split-btn" class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg">
                        Cancelar
                    </button>
                    <button id="process-payment-btn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
                        Confirmar Pago
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Archivo de lógica principal -->
    <script type="module" src="js/main.js"></script>
    <script>
      // Lógica de navegación simple
      document.addEventListener('DOMContentLoaded', () => {
          const menuBtns = document.querySelectorAll('.menu-btn');
          const backBtns = document.querySelectorAll('.back-to-menu-btn');
          const pages = document.querySelectorAll('.page-content');
          const homeMenu = document.getElementById('home-menu');
          function showPage(pageId) {
              pages.forEach(p => p.classList.remove('active'));
              document.getElementById(pageId).classList.add('active');
          }
          menuBtns.forEach(btn => {
              btn.addEventListener('click', () => showPage(btn.dataset.page));
          });
          backBtns.forEach(btn => {
              btn.addEventListener('click', () => showPage('home-menu'));
          });
          // Solo mostrar menú al iniciar
          pages.forEach(p => p.classList.remove('active'));
          homeMenu.classList.add('active');
      });
    </script>
</body>
</html>
